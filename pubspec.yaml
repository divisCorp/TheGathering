name: the_gathering
description: "The Gathering - Uplifting activities. Genuine friendships. Right where you are. Mobile app for LDS members to find and organize wholesome activities."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Core
  supabase_flutter: ^2.5.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0

  # UI / Navigation
  cupertino_icons: ^1.0.6
  go_router: ^14.0.0  # For navigation shell
  flutter_riverpod: ^2.5.1  # State management (recommended for clean architecture)

  # Permissions (for PR1 location stub)
  permission_handler: ^11.3.1

  # Utils
  url_launcher: ^6.2.5  # For terms/privacy links
  image_picker: ^1.1.2  # For avatar upload (PR2)
  flutter_dotenv: ^5.1.0  # For easy Supabase keys in .env

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - .env

  # Add fonts later for uplifting feel
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
